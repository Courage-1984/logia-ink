<!-- Security Headers (Meta Tags) -->
<!-- Note: For full security headers, configure them on your web server -->
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<!-- Note: X-Frame-Options only works via HTTP headers, not meta tags -->
<meta http-equiv="X-XSS-Protection" content="1; mode=block" />
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
<meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />

<!-- Content Security Policy (CSP) -->
<!-- Adjust based on your needs - this is a basic CSP -->
<meta
  http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://plausible.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://plausible.io; frame-ancestors 'none';"
/>
